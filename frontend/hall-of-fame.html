<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>.nav-logo-icon-wrap{width:50px;height:50px;overflow:hidden;flex-shrink:0;filter:drop-shadow(0 0 10px rgba(255,215,0,0.6))}.nav-logo-icon{width:125px;height:auto;margin-left:-38px;margin-top:-10px;mix-blend-mode:screen;display:block}
.hof-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px; max-width:1200px; margin:0 auto; }
.hof-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; padding:28px; position:relative; overflow:hidden; backdrop-filter:blur(10px); transition:all 0.3s; }
.hof-card:hover { border-color:rgba(255,215,0,0.3); transform:translateY(-3px); box-shadow:0 15px 40px rgba(255,215,0,0.08); }
.hof-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#FFD700,#FFA500); }
.hof-crown { position:absolute; top:16px; right:16px; width:40px; height:40px; color:#FFD700; opacity:0.3; }
.hof-season-name { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:3px; color:#fff; margin-bottom:4px; }
.hof-season-date { font-family:'Orbitron',sans-serif; font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:2px; margin-bottom:20px; }
.hof-champion { display:flex; align-items:center; gap:16px; padding:16px; background:rgba(255,215,0,0.05); border:1px solid rgba(255,215,0,0.15); border-radius:8px; margin-bottom:16px; }
.hof-champion-avatar { width:56px; height:56px; border-radius:50%; border:3px solid #FFD700; background:linear-gradient(135deg,#3B0764,#1E40AF); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:24px; color:rgba(255,255,255,0.8); flex-shrink:0; box-shadow:0 0 20px rgba(255,215,0,0.3); }
.hof-champion-info { flex:1; }
.hof-champion-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:#FFD700; text-shadow:0 0 10px rgba(255,215,0,0.3); }
.hof-champion-title { font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase; font-family:'Orbitron',sans-serif; }
.hof-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.hof-stat { text-align:center; padding:10px 8px; background:rgba(255,255,255,0.03); border-radius:8px; border:1px solid rgba(255,255,255,0.06); }
.hof-stat-value { font-family:'Bebas Neue',sans-serif; font-size:24px; color:#fff; line-height:1; }
.hof-stat-label { font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:1px; font-family:'Orbitron',sans-serif; margin-top:4px; }
.hof-empty { text-align:center; padding:60px 20px; }
.hof-empty p { font-size:18px; color:rgba(255,255,255,0.4); margin-bottom:12px; }
@media(max-width:768px){ .hof-grid{grid-template-columns:1fr;} .hof-stats{grid-template-columns:repeat(2,1fr);} }
</style>

<section class="page-section">
  <div style="max-width:1200px; margin:0 auto;">
    <div class="section-header">
      <div class="section-label">LEYENDAS</div>
      <h2 class="section-title">SALÓN DE LA <span class="accent">FAMA</span></h2>
    </div>
    <div id="hofContent">
      <div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:18px;">Cargando...</div>
    </div>
  </div>
</section>



<script src="app.js"></script>
<script>
async function loadHallOfFame() {
  const container = document.getElementById('hofContent');
  const { ok, data } = await apiFetch('/hall-of-fame');
  if (!ok || data.length === 0) {
    container.innerHTML = `<div class="hof-empty">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"><circle cx="12" cy="8" r="6"/><path d="M15.33 15.33A10 10 0 0 1 12 16a10 10 0 0 1-3.33-.67"/><path d="M5.68 19.31A10 10 0 0 0 12 22a10 10 0 0 0 6.32-2.69"/></svg>
      <p>Aún no hay temporadas finalizadas.</p>
      <p style="font-size:14px;color:rgba(255,255,255,0.25);">Cuando una temporada termine, su campeón aparecerá aquí.</p>
    </div>`;
    return;
  }

  let html = '<div class="hof-grid">';
  data.forEach(s => {
    const startDate = new Date(s.started_at).toLocaleDateString();
    const endDate = s.ended_at ? new Date(s.ended_at).toLocaleDateString() : '—';
    html += `<div class="hof-card">
      <svg class="hof-crown" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg>
      <div class="hof-season-name">${s.name}</div>
      <div class="hof-season-date">${startDate} — ${endDate}</div>
      <a href="player.html?id=${s.champion_id}" class="hof-champion" style="text-decoration:none;">
        <div class="hof-champion-avatar">${(s.champion_name || '?')[0]}</div>
        <div class="hof-champion-info">
          <div class="hof-champion-name">${s.champion_name || 'Desconocido'}</div>
          <div class="hof-champion-title">🏆 CAMPEÓN</div>
        </div>
      </a>
      <div class="hof-stats">
        <div class="hof-stat"><div class="hof-stat-value">${s.matches_played || 0}</div><div class="hof-stat-label">Partidas</div></div>
        <div class="hof-stat"><div class="hof-stat-value">${s.wins || 0}</div><div class="hof-stat-label">Victorias</div></div>
        <div class="hof-stat"><div class="hof-stat-value">${s.losses || 0}</div><div class="hof-stat-label">Derrotas</div></div>
        <div class="hof-stat"><div class="hof-stat-value">${s.points || 0}</div><div class="hof-stat-label">Puntos</div></div>
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

loadHallOfFame();
updateNav();
</script>
</body>
