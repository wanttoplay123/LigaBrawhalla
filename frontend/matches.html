<section class="page-section">
  <div style="max-width:900px; margin:0 auto;">
    <div class="section-header">
      <div class="section-label">CALENDARIO 2026</div>
      <h2 class="section-title">PARTIDAS DE LA <span class="accent">LIGA</span></h2>
    </div>
    <div class="match-filters" style="display:grid;grid-template-columns:1.4fr 0.9fr 0.7fr auto;gap:10px;margin-bottom:18px;">
      <input id="matchNameSearch" type="search" placeholder="Buscar jugador o rival..." oninput="renderMatches()" style="padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;">
      <input id="matchDateSearch" type="date" onchange="renderMatches()" style="padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;">
      <input id="matchRoundSearch" type="number" min="1" placeholder="Jornada" oninput="renderMatches()" style="padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;">
      <button type="button" onclick="clearMatchFilters()" style="padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.7);font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;">LIMPIAR</button>
    </div>
    <div id="matchesContent">
      <div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:18px;">Cargando...</div>
    </div>
  </div>
</section>

<div id="matchDetailModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.72);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:18px;">
  <div style="background:var(--dark3);border:1px solid var(--card-border);border-radius:12px;padding:28px;max-width:620px;width:100%;box-shadow:0 20px 80px rgba(0,0,0,0.45);">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;">
      <div>
        <div id="matchDetailKicker" style="font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1.5px;color:rgba(255,215,0,0.65);margin-bottom:6px;"></div>
        <h3 id="matchDetailTitle" style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fff;margin:0;"></h3>
      </div>
      <button type="button" onclick="closeMatchDetail()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:6px;width:34px;height:34px;cursor:pointer;font-size:18px;">x</button>
    </div>
    <div id="matchDetailBody"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
let allMatches = [];
let activeDetailMatchId = null;

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function formatDate(dateStr) {
  if (!dateStr) return { dayName: null, day: null, month: null, hours: null, minutes: null };
  const d = new Date(dateStr.includes(' ') ? dateStr.replace(' ', 'T') : dateStr);
  const dayNames = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  return {
    dayName: dayNames[d.getDay()],
    day: d.getDate().toString().padStart(2, '0'),
    month: (d.getMonth() + 1).toString().padStart(2, '0'),
    hours: d.getHours().toString().padStart(2, '0'),
    minutes: d.getMinutes().toString().padStart(2, '0')
  };
}

function dateKey(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr.includes(' ') ? dateStr.replace(' ', 'T') : dateStr);
  if (Number.isNaN(d.getTime())) return '';
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function clearMatchFilters() {
  document.getElementById('matchNameSearch').value = '';
  document.getElementById('matchDateSearch').value = '';
  document.getElementById('matchRoundSearch').value = '';
  renderMatches();
}

function canEditMatchCode() {
  return getRole() === 'admin';
}

function canSeeMatchCode(match) {
  if (getRole() === 'admin') return true;
  const playerId = getPlayerId();
  return playerId && (playerId === match.player1_id || playerId === match.player2_id);
}

function openMatchDetail(matchId) {
  const match = allMatches.find(m => m.id === matchId);
  if (!match) return;
  activeDetailMatchId = matchId;
  const fd = formatDate(match.scheduled_date);
  const timeStr = fd.hours !== null ? `${fd.hours}:${fd.minutes}` : 'Pendiente';
  const dateStr = fd.dayName ? `${fd.dayName} ${fd.day}/${fd.month}` : 'Fecha pendiente';
  const p1Name = match.player1_name || match.player1_username || 'J1';
  const p2Name = match.player2_name || match.player2_username || 'J2';
  const editable = canEditMatchCode();
  const canSee = canSeeMatchCode(match);
  const statusLabel = match.status === 'completed' ? `Resultado ${match.score || ''}` : 'Pendiente';
  const codeValue = match.match_code || '';

  document.getElementById('matchDetailKicker').textContent = `JORNADA ${match.round_number} · ${dateStr} · ${timeStr}`;
  document.getElementById('matchDetailTitle').textContent = `${p1Name} vs ${p2Name}`;
  document.getElementById('matchDetailBody').innerHTML = `
    <div class="match-detail-grid">
      <div class="match-detail-player">
        <div style="font-family:'Orbitron',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:6px;">J1</div>
        <div style="font-size:18px;font-weight:700;color:${match.winner_id === match.player1_id ? '#22c55e' : '#fff'};">${escapeHtml(p1Name)}</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px;">${escapeHtml(match.player1_tier || '')}</div>
      </div>
      <div style="font-family:'Orbitron',sans-serif;font-size:18px;color:#a855f7;font-weight:700;text-align:center;">${match.status === 'completed' ? escapeHtml(match.score || '-') : 'VS'}</div>
      <div class="match-detail-player" style="text-align:right;">
        <div style="font-family:'Orbitron',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:6px;">J2</div>
        <div style="font-size:18px;font-weight:700;color:${match.winner_id === match.player2_id ? '#22c55e' : '#fff'};">${escapeHtml(p2Name)}</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px;">${escapeHtml(match.player2_tier || '')}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;">
      <div style="padding:10px;border-radius:8px;background:rgba(255,255,255,0.03);"><div style="font-size:11px;color:rgba(255,255,255,0.35);font-family:'Orbitron',sans-serif;">ESTADO</div><div style="color:#fff;font-weight:700;margin-top:4px;">${escapeHtml(statusLabel)}</div></div>
      <div style="padding:10px;border-radius:8px;background:rgba(255,255,255,0.03);"><div style="font-size:11px;color:rgba(255,255,255,0.35);font-family:'Orbitron',sans-serif;">FECHA</div><div style="color:#fff;font-weight:700;margin-top:4px;">${escapeHtml(dateStr)}</div></div>
      <div style="padding:10px;border-radius:8px;background:rgba(255,255,255,0.03);"><div style="font-size:11px;color:rgba(255,255,255,0.35);font-family:'Orbitron',sans-serif;">HORA</div><div style="color:#fff;font-weight:700;margin-top:4px;">${escapeHtml(timeStr)}</div></div>
    </div>
    ${match.legend1 || match.legend2 ? `<div style="margin-top:12px;color:rgba(255,255,255,0.45);font-size:13px;">Leyendas: ${escapeHtml(match.legend1 || '-')} / ${escapeHtml(match.legend2 || '-')}</div>` : ''}
    ${canSee ? `
    <div class="match-code-box">
      <div style="font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px;color:rgba(255,215,0,0.7);margin-bottom:8px;">CÓDIGO DE SALA</div>
      ${editable ? `
        <form id="publicMatchCodeForm" style="display:flex;gap:8px;">
          <input id="publicMatchCodeInput" type="text" maxlength="80" value="${escapeHtml(codeValue)}" placeholder="Escribe el código de la sala aquí" style="flex:1;min-width:0;padding:11px 13px;background:rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;">
          <button type="submit" style="padding:11px 16px;background:rgba(123,47,190,0.28);color:#fff;border:1px solid rgba(168,85,247,0.45);border-radius:6px;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;">GUARDAR</button>
        </form>
        <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:8px;">Solo el admin puede cambiar este código.</div>
      ` : `
        <div style="font-size:24px;font-family:'Orbitron',sans-serif;color:${codeValue ? '#FFD700' : 'rgba(255,255,255,0.35)'};letter-spacing:1px;">${escapeHtml(codeValue || 'Todavía no hay código')}</div>
      `}
    </div>
    ` : ''}
  `;

  document.getElementById('matchDetailModal').style.display = 'flex';
  const form = document.getElementById('publicMatchCodeForm');
  if (form) form.addEventListener('submit', savePublicMatchCode);
}

function closeMatchDetail() {
  document.getElementById('matchDetailModal').style.display = 'none';
  activeDetailMatchId = null;
}

async function savePublicMatchCode(e) {
  e.preventDefault();
  if (!activeDetailMatchId) return;
  const input = document.getElementById('publicMatchCodeInput');
  const { ok, data } = await apiFetch(`/matches/${activeDetailMatchId}/code`, {
    method: 'PATCH',
    body: JSON.stringify({ match_code: input.value.trim() })
  });
  if (ok) {
    const match = allMatches.find(m => m.id === activeDetailMatchId);
    if (match) match.match_code = data.match_code;
    showNotification(data.match_code ? 'Código de sala guardado' : 'Código de sala eliminado', 'success');
    openMatchDetail(activeDetailMatchId);
    renderMatches();
  } else {
    showNotification(data.error || 'No se pudo guardar el código', 'error');
  }
}

async function loadAllMatches() {
  const container = document.getElementById('matchesContent');
  const { ok, data } = await apiFetch('/matches');

  if (!ok || data.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px 0;"><div style="font-size:48px;margin-bottom:16px;opacity:0.3;">⚔</div><div style="color:rgba(255,255,255,0.4);font-size:16px;">No hay partidas — No hay temporada activa</div></div>';
    return;
  }
  allMatches = data;
  renderMatches();
}

function renderMatches() {
  const container = document.getElementById('matchesContent');
  const nameSearch = (document.getElementById('matchNameSearch')?.value || '').trim().toLowerCase();
  const dateSearch = document.getElementById('matchDateSearch')?.value || '';
  const roundSearch = document.getElementById('matchRoundSearch')?.value;
  const filtered = allMatches.filter(m => {
    const names = `${m.player1_name || m.player1_username || ''} ${m.player2_name || m.player2_username || ''}`.toLowerCase();
    const matchesName = !nameSearch || names.includes(nameSearch);
    const matchesDate = !dateSearch || dateKey(m.scheduled_date) === dateSearch;
    const matchesRound = !roundSearch || Number(m.round_number) === Number(roundSearch);
    return matchesName && matchesDate && matchesRound;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:50px 0;color:rgba(255,255,255,0.45);font-size:16px;">No hay partidas con esos filtros.</div>';
    return;
  }

  const rounds = {};
  filtered.forEach(m => {
    const rn = m.round_number;
    if (!rounds[rn]) rounds[rn] = { round_number: rn, matches: [] };
    rounds[rn].matches.push(m);
  });

  const sortedRounds = Object.values(rounds).sort((a, b) => a.round_number - b.round_number);
  let html = '';

  sortedRounds.forEach((round, ri) => {
    const firstMatch = round.matches[0];
    const fd = formatDate(firstMatch.scheduled_date);
    const isEven = round.round_number % 2 === 0;
    const dayLabel = isEven ? 'DOMINGO' : 'SÁBADO';

    const dayDisplay = fd.dayName ? `${fd.dayName} ${fd.day}/${fd.month}` : '—';

    html += `<div class="round-card" style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;margin-bottom:16px;overflow:hidden;backdrop-filter:blur(10px);">`;

    html += `<div style="display:flex;align-items:center;gap:10px;padding:14px 20px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--card-border);">
      <span style="font-family:'Orbitron',sans-serif;font-size:13px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,0.3);min-width:36px;">J${round.round_number}</span>
      <span style="flex:1;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#fff;">${dayLabel}</span>
      <span style="font-size:12px;font-family:'Orbitron',sans-serif;letter-spacing:1px;color:rgba(255,255,255,0.3);">${dayDisplay}</span>
    </div>`;

    round.matches.forEach(m => {
      const isCompleted = m.status === 'completed';
      const fd2 = formatDate(m.scheduled_date);
      const timeStr = fd2.hours !== null ? `${fd2.hours}:${fd2.minutes}` : '—';
      const isRescheduled = m.rescheduled == 1;

      let rescheduleNote = '';
      if (isRescheduled && fd2.dayName) {
        rescheduleNote = `<div style="padding:2px 20px 8px;font-size:11px;color:rgba(255,215,0,0.5);font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;">↳ Reprogramada para el ${fd2.dayName.toLowerCase()} ${fd2.day}/${fd2.month}</div>`;
      }

      html += `<div class="match-list-row" onclick="openMatchDetail(${m.id})" title="Ver datos de la jornada ${round.round_number}" style="display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.04);${isCompleted ? 'opacity:0.7;' : ''}">`;

      html += `<div style="flex:1;display:flex;align-items:center;gap:8px;">
        <span style="font-size:14px;font-weight:600;color:${isCompleted && m.winner_id === m.player1_id ? '#22c55e' : 'rgba(255,255,255,0.8)'};">${m.player1_name || m.player1_username}</span>
      </div>`;

      html += `<div style="display:flex;align-items:center;gap:8px;margin:0 12px;">
        ${isCompleted ? `<span style="font-weight:700;font-size:15px;color:#a855f7;font-family:'Orbitron',sans-serif;">${m.score || '—'}</span>` : '<span style="font-weight:600;font-size:11px;color:rgba(255,255,255,0.2);font-family:\'Orbitron\',sans-serif;letter-spacing:1px;">VS</span>'}
      </div>`;

      html += `<div style="flex:1;display:flex;align-items:center;gap:8px;text-align:right;justify-content:flex-end;">
        <span style="font-size:14px;font-weight:600;color:${isCompleted && m.winner_id === m.player2_id ? '#22c55e' : 'rgba(255,255,255,0.8)'};">${m.player2_name || m.player2_username}</span>
      </div>`;

      html += `<div style="min-width:80px;text-align:right;font-size:12px;font-family:'Orbitron',sans-serif;letter-spacing:1px;color:${isRescheduled ? 'rgba(255,215,0,0.6)' : 'rgba(255,255,255,0.3)'};">`;
      html += isRescheduled ? `🔄 ${timeStr}` : `${timeStr}`;
      html += `</div>`;

      if (m.legend1) {
        html += `<div style="font-size:10px;color:rgba(255,255,255,0.2);font-family:'Rajdhani',sans-serif;margin-left:8px;">${m.legend1}/${m.legend2}</div>`;
      }

      html += `</div>`;
      if (rescheduleNote) html += rescheduleNote;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

loadAllMatches();
updateNav();
</script>
