<section class="page-section">
  <div style="max-width:1200px; margin:0 auto;">
    <div id="playerContent">
      <div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:18px;">Cargando...</div>
    </div>
  </div>
</section>

<script src="app.js"></script>
<script>
async function loadPlayer() {
  const params = new URLSearchParams(window.location.search);
  const playerId = params.get('id');
  if (!playerId) {
    document.getElementById('playerContent').innerHTML = '<div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);">ID de jugador no especificado</div>';
    return;
  }

  const { ok, data } = await apiFetch(`/players/${playerId}`);
  if (!ok) {
    document.getElementById('playerContent').innerHTML = '<div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);">Jugador no encontrado</div>';
    return;
  }

  const p = data;
  document.title = `${p.brawlhalla_name || p.username} - CO'S CHAMPIONS LEAGUE`;

  const html = `
    <div class="player-profile">
      <div class="player-profile-header">
        <div class="player-avatar-large">
          <svg width="80" height="80" viewBox="0 0 40 40" fill="none"><path d="M20 2L4 8v12c0 8 6 14 16 18 10-4 16-10 16-18V8L20 2z" fill="#7B2FBE" stroke="#FFD700" stroke-width="1"/><path d="M20 8L20 22M14 14L20 8L26 14" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="player-profile-info">
          <h2>${p.brawlhalla_name || p.username}</h2>
          <span class="player-tier-badge">${p.tier || 'Unranked'}</span>
          <span class="player-rating">Rating: ${p.rating || 0}</span>
        </div>
      </div>

      <div class="player-stats-grid">
        <div class="stat-card">
          <span class="stat-value">${p.stats?.total_matches || 0}</span>
          <span class="stat-label">Partidas Liga</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">${p.stats?.wins || 0}</span>
          <span class="stat-label">Ganadas</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">${p.stats?.losses || 0}</span>
          <span class="stat-label">Perdidas</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">${p.points || 0}</span>
          <span class="stat-label">Puntos</span>
        </div>
      </div>

      <div class="player-stats-grid">
        <div class="stat-card">
          <span class="stat-value">${p.damage_dealt || 0}</span>
          <span class="stat-label">Daño Infligido (total)</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">${p.damage_taken || 0}</span>
          <span class="stat-label">Daño Recibido (total)</span>
        </div>
      </div>

      <div class="match-history">
        <div style="display:flex;align-items:center;justify-content:space-between;margin:24px 0 16px;">
          <h3 style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#fff;">HISTORIAL DE PARTIDAS</h3>
          <button id="clearH2hBtn" class="admin-btn btn-action" style="display:none;font-size:11px;" onclick="clearH2H()">MOSTRAR TODAS</button>
        </div>
        <div id="h2hSummary" style="display:none;margin-bottom:12px;padding:12px 16px;background:rgba(123,47,190,0.08);border:1px solid rgba(123,47,190,0.2);border-radius:8px;"></div>
        <div id="matchHistory">
          <div style="text-align:center;padding:20px 0;color:rgba(255,255,255,0.3);">Cargando...</div>
        </div>
      </div>
    </div>`;

  document.getElementById('playerContent').innerHTML = html;

  let allMatches = [];
  let currentH2hOpponentId = null;

  const { ok: matchOk, data: matches } = await apiFetch(`/players/${playerId}/matches`);
  allMatches = matches || [];
  renderMatchHistory();

  async function loadH2H(opponentId) {
    currentH2hOpponentId = opponentId;
    const { ok, data } = await apiFetch(`/players/h2h/${playerId}/${opponentId}`);
    if (!ok) return;
    const summary = document.getElementById('h2hSummary');
    summary.style.display = 'block';
    const p1Wins = data.player1_id === parseInt(playerId) ? data.player1_wins : data.player2_wins;
    const p2Wins = data.player1_id === parseInt(playerId) ? data.player2_wins : data.player1_wins;
    const oppName = data.matches.length > 0
      ? (data.player1_id === parseInt(opponentId) ? (data.matches[0].player1_name || data.matches[0].player1_username) : (data.matches[0].player2_name || data.matches[0].player2_username))
      : 'Rival';
    summary.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div><strong style="font-size:16px;">${oppName}</strong></div>
        <div style="display:flex;gap:20px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;">
          <span style="color:#22c55e;">${p1Wins}G</span>
          <span style="color:rgba(255,255,255,0.3);">vs</span>
          <span style="color:#ef4444;">${p2Wins}P</span>
          <span style="color:rgba(255,255,255,0.4);font-size:14px;">(${data.total_matches} partidas)</span>
        </div>
      </div>`;
    document.getElementById('clearH2hBtn').style.display = 'inline-block';
    renderMatchHistory(opponentId);
  }

  function renderMatchHistory(filterOpponentId) {
    const historyContainer = document.getElementById('matchHistory');

    let filtered = allMatches;
    if (filterOpponentId) {
      filtered = allMatches.filter(m =>
        (m.player1_id === filterOpponentId || m.player2_id === filterOpponentId)
      );
    }

    if (filtered.length === 0) {
      historyContainer.innerHTML = '<div style="text-align:center;padding:20px 0;color:rgba(255,255,255,0.3);">Sin partidas registradas</div>';
      return;
    }

    let historyHtml = '';
    filtered.forEach(m => {
      const isPlayer1 = m.player1_id === parseInt(playerId);
      const opponentId = isPlayer1 ? m.player2_id : m.player1_id;
      const opponentName = isPlayer1 ? (m.player2_name || m.player2_username) : (m.player1_name || m.player1_username);
      const playerScore = m.score ? (isPlayer1 ? m.score.split('-')[0] : m.score.split('-')[1]) : null;
      const opponentScore = m.score ? (isPlayer1 ? m.score.split('-')[1] : m.score.split('-')[0]) : null;
      const won = m.winner_id === parseInt(playerId);
      const statusBadge = m.status === 'completed'
        ? `<span style="color:${won ? '#22c55e' : '#ef4444'};font-weight:600;">${won ? 'VICTORIA' : 'DERROTA'}</span>`
        : '<span style="color:rgba(255,255,255,0.3);">PENDIENTE</span>';

      let dateStr = '';
      const dateSource = m.played_date || m.scheduled_date;
      if (dateSource) {
        const d = new Date(dateSource.includes(' ') ? dateSource.replace(' ', 'T') : dateSource);
        const dayName = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'][d.getDay()];
        dateStr = `${dayName} ${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
      }
      if (m.rescheduled == 1) dateStr = '🔄 ' + dateStr;

      historyHtml += `
        <div class="match-card ${m.status}" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:12px;flex:1;">
            <span class="match-id-badge">J${m.round_number}</span>
            <span style="font-weight:600;cursor:pointer;color:${filterOpponentId ? '#a855f7' : 'rgba(255,255,255,0.8)'};text-decoration:${filterOpponentId ? 'underline' : 'none'};" onclick="loadH2H(${opponentId})">${opponentName}</span>
          </div>
          <div style="text-align:center;flex:1;">
            ${statusBadge}
            ${m.score ? `<span style="margin-left:8px;color:rgba(255,255,255,0.4);font-size:13px;">${playerScore}-${opponentScore}</span>` : ''}
          </div>
          <div style="text-align:right;flex:1;color:rgba(255,255,255,0.3);font-size:11px;font-family:'Orbitron',sans-serif;letter-spacing:0.5px;">
            ${dateStr}
          </div>
        </div>`;
    });
    historyContainer.innerHTML = historyHtml;
  }

  function clearH2H() {
    currentH2hOpponentId = null;
    document.getElementById('h2hSummary').style.display = 'none';
    document.getElementById('clearH2hBtn').style.display = 'none';
    renderMatchHistory();
  }

  window.loadH2H = loadH2H;
  window.clearH2H = clearH2H;
}

loadPlayer();
updateNav();
</script>
</body>
</html>
